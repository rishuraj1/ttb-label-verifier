services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ttb
      POSTGRES_PASSWORD: ttb
      POSTGRES_DB: ttb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttb -d ttb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      POSTGRES_URL: postgres://ttb:ttb@db:5432/ttb
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
